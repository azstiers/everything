name: Convert MOV to MP4

on:
  push:
    paths:
      - '**/*.mov'

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Convert MOV to MP4
        run: |
          set -e
          convert_count=0
          while IFS= read -r -d '' mov; do
            mp4="${mov%.*}.mp4"
            if [ ! -f "$mp4" ] || [ "$mov" -nt "$mp4" ]; then
              ffmpeg -y -i "$mov" -c:v libx264 -crf 23 -preset medium -c:a aac "$mp4"
              convert_count=$((convert_count+1))
            fi
          done < <(find . -type f -name '*.mov' -print0)
          echo "Converted $convert_count files."

      - name: Commit and push converted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --force -- "**/*.mp4" || true
          if git diff --cached --quiet; then
            echo "No converted files to commit."
            exit 0
          fi
          git commit -m "Build: convert .mov to .mp4 [skip ci]" || echo "Nothing to commit"
          git push
