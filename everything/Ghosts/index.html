<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Example Artwork — Everything Is Coming Back</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: monospace;
      min-height: 100%;
    }

    .artwork {
      max-width: 900px;
      margin: 0 auto;
      padding: 8vh 6vw 12vh;
    }

    .artwork img,
    .artwork video {
      width: 100%;
      display: block;
      margin-bottom: 2em;
    }

    /* Add more images by duplicating the img tag above */

    .artwork h1 {
      font-family: monospace;
      font-size: clamp(18px, 2.5vw, 32px);
      font-weight: normal;
      letter-spacing: .15em;
      margin: 0 0 1em;
      color: #fff;
    }

    .artwork p {
      font-size: clamp(14px, 1.4vw, 20px);
      line-height: 1.7;
      color: #ccc;
      margin: 0 0 1.5em;
      max-width: 65ch;
    }

    nav {
      position: fixed;
      bottom: 3vw;
      left: 3vw;
      right: 3vw;
      display: flex;
      justify-content: space-between;
      z-index: 2;
    }

    nav a {
      color: #fff;
      text-decoration: underline;
      text-underline-offset: .35em;
      font-family: monospace;
      font-size: clamp(18px, 2vw, 34px);
      letter-spacing: .25em;
      transition: color 0.2s;
    }

    nav a:hover {
      color: #ffee00;
    }
  </style>
</head>
<body>

  <div class="artwork">
    <div class="art-card">
      <video class="art-video" autoplay muted loop playsinline controls poster="image-thumb.jpg">
        <source src="4_Wind_Spinners.mp4" type="video/mp4">
        <source src="4_Wind_Spinners.mov" type="video/quicktime">
        <!-- Fallback shown only if the browser doesn't support <video> -->
        <img src="image.jpg" alt="Ghosts">
      </video>
      <!-- Plain image fallback for older browsers; hidden when video is playable -->
      <img class="video-fallback" src="image.jpg" alt="Ghosts">
      <span class="art-title">Ghosts</span>
    </div>
    <script>
      (function(){
        try {
          var v = document.querySelector('.art-card .art-video');
          var f = document.querySelector('.art-card .video-fallback');
          if (v && f) {
            // hide fallback when browser can probably play MP4 or QuickTime
            var canMp4 = v.canPlayType && v.canPlayType('video/mp4');
            var canMov = v.canPlayType && v.canPlayType('video/quicktime');
            if ((canMp4 === 'probably' || canMp4 === 'maybe') || (canMov === 'probably' || canMov === 'maybe')) f.style.display = 'none';
          }
        } catch (e) { /* ignore */ }
      })();
    </script>

    <h1 style="margin-top:1.25rem">Ghosts</h1>
    <p>Work in project.  Puts words in trees</p>
    <p>Seeking collaborators.</p>
  </div>

  <nav>
    <a href="../index.html">EVERYTHING</a>
    <a href="../../index.html">HOME</a>
  </nav>

</body>
</html>
