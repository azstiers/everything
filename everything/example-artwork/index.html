<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Example Artwork — Everything Is Coming Back</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: monospace;
      min-height: 100%;
    }

    .artwork {
      max-width: 900px;
      margin: 0 auto;
      padding: 8vh 6vw 12vh;
    }

    .artwork img {
      width: 100%;
      display: block;
      margin-bottom: 2em;
    }

    /* Add more images by duplicating the img tag above */

    .artwork h1 {
      font-family: monospace;
      font-size: clamp(18px, 2.5vw, 32px);
      font-weight: normal;
      letter-spacing: .15em;
      margin: 0 0 1em;
      color: #fff;
    }

    .artwork p {
      font-size: clamp(14px, 1.4vw, 20px);
      line-height: 1.7;
      color: #ccc;
      margin: 0 0 1.5em;
      max-width: 65ch;
    }

    nav {
      position: fixed;
      bottom: 3vw;
      left: 3vw;
      right: 3vw;
      display: flex;
      justify-content: space-between;
      z-index: 2;
    }

    nav a {
      color: #fff;
      text-decoration: underline;
      text-underline-offset: .35em;
      font-family: monospace;
      font-size: clamp(18px, 2vw, 34px);
      letter-spacing: .25em;
      transition: color 0.2s;
    }

    nav a:hover {
      color: #ffee00;
    }
  </style>
</head>
<body>

  <div class="artwork">
    <a class="art-card" href="image.jpg">
      <img src="image.jpg" alt="Example Artwork">
      <span class="art-title">EXAMPLE ARTWORK</span>
    </a>

    <h1 style="margin-top:1.25rem">EXAMPLE ARTWORK</h1>
    <p>Description of the artwork goes here.</p>
    <p>You can add as many paragraphs as you need.</p>
  </div>

  <nav>
    <a href="../index.html">EVERYTHING</a>
    <a href="../../index.html">HOME</a>
  </nav>

</body>
</html>
