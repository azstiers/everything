<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Everything — Everything Is Coming Back</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #000;
      color: #fff;
      font-family: "Inter", sans-serif;
    }

    .gallery {
      max-width: 900px;
      margin: 0 auto;
      padding: 12vh 6vw 10vh;
    }

    .gallery h1 {
      font-size: clamp(36px, 5vw, 64px);
      line-height: 1;
      margin: 0 0 1rem;
    }

    .gallery p {
      max-width: 70ch;
      color: #ccc;
      margin: 0 0 2rem;
      font-size: clamp(16px, 1.6vw, 22px);
      line-height: 1.8;
    }

    .artwork-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .artwork-list li {
      margin-bottom: 1.5rem;
    }

    .artwork-list a {
      color: #fff;
      font-size: clamp(24px, 3vw, 36px);
      text-decoration: underline;
      text-underline-offset: .25em;
    }

    nav {
      position: fixed;
      bottom: 3vw;
      left: 3vw;
      right: 3vw;
      display: flex;
      justify-content: space-between;
      z-index: 2;
    }

    nav a {
      color: #fff;
      text-decoration: underline;
      text-underline-offset: .35em;
      font-family: monospace;
      font-size: clamp(18px, 2vw, 34px);
      letter-spacing: .25em;
      transition: color 0.2s;
    }

    nav a:hover {
      color: #ffee00;
    }
  </style>
</head>
<body>
  <main class="gallery">
    <h1>EVERYTHING</h1>
    <p>Each artwork lives in its own folder. Click a title to open the artwork page and description.</p>

    <ul class="artwork-list">
      <li><a href="example-artwork/">Example Artwork</a></li>
    </ul>
  </main>

  <nav>
    <a href="../index.html">HOME</a>
    <span></span>
  </nav>
</body>
</html>
